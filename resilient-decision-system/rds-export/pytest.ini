[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: Pure unit tests with no I/O
    integration: Tests that hit the full API stack
    slow: Tests that involve real time delays (e.g. TTL expiry)
