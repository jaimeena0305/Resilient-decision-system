version: "3.9"

services:
  # ── API Application ───────────────────────────────────────────────────────
  app:
    build: .
    container_name: decisions_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://decisions:decisions@db:5432/decisions
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      # Hot-reload YAML workflow configs without rebuild
      - ./app/workflows:/app/app/workflows:ro
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: decisions_db
    environment:
      POSTGRES_DB:       decisions
      POSTGRES_USER:     decisions
      POSTGRES_PASSWORD: decisions
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decisions"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: decisions_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
